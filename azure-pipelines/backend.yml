trigger:
  branches:
    include:
      - main
  paths:
    include:
      - api/**
    exclude:
      - app/**

pool:
  vmImage: 'ubuntu-latest'

variables:
  dockerRegistryServiceConnection: 'sc-azure-bi'
  imageRepository: 'bi-loader-api'
  containerRegistry: 'acrbistudentdev01.azurecr.io'
  dockerfilePath: '$(Build.SourcesDirectory)/api/Dockerfile'
  tag: '$(Build.BuildId)'
  imageTag: '$(containerRegistry)/$(imageRepository):$(tag)'

stages:
  - stage: Build
    displayName: Build and Push Image
    jobs:
      - job: BuildAndPush
        displayName: Build Docker Image
        steps:
          - task: Docker@2
            displayName: Build and Push Image
            inputs:
              command: buildAndPush
              repository: $(imageRepository)
              dockerfile: $(dockerfilePath)
              containerRegistry: $(dockerRegistryServiceConnection)
              tags: |
                $(tag)

        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureContainerApps@1
                  displayName: Deploy bi-loader-api
                  inputs:
                    azureSubscription: 'sc-azure-bi'
                    containerAppName: 'bi-loader-api'
                    resourceGroup: 'rg-bi-student-dev'
                    imageToDeploy: $(imageTag)
                    ingress: 'external'
                    targetPort: 3000
                    environmentVariables: |
                      DB_SERVER=$(DB_SERVER)
                      DB_PORT=$(DB_PORT)
                      DB_NAME=$(DB_NAME)
                      DB_USER=$(DB_USER)
                      DB_PASSWORD=$(DB_PASSWORD)
                      CORS_ORIGIN=$(CORS_ORIGIN)
                      NODE_ENV=production
